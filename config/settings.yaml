paths:
  adb_path: "D:/Scuola/4°_superiore/Dronebot/scrcpy/adb.exe"
  ffmpeg_path: "D:/Scuola/4°_superiore/Dronebot/scrcpy/ffmpeg.exe"

capture:
  max_fps: 30
  bitrate_mbps: 16
  use_original_resolution: true
  resize_width: 1280
  resize_height: 720
  restart_on_eof: true

runtime:
  window_name: "Drone Detector Fire"
  show_metrics: true
  log_file: "logs/runtime.log"
  yolo_interval_sec: 0.5

models:
  default: "best_test_tight"
  registry:
    best_test:
      path: "models/best_test.pt"
      conf: 0.35
      iou: 0.45
    best_test_tight:
      path: "models/best_test.pt"
      conf: 0.40
      iou: 0.45
    caruso_fuoco1:                  
      path: "models/caruso_fuoco1.pt" 
      conf: 0.35
      iou: 0.45

